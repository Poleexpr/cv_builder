name: Resume build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=ubuntu:22.04 \
            -t resume-builder .

      - name: Run container and extract PDF
        run: |
          docker run --name resume-build resume-builder
          docker cp resume-build:/output/resume.pdf ./resume.pdf
          docker rm resume-build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-en
          path: resume.pdf
